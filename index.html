<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyraX-Dev | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #10b981;
            --dark-bg: #020617;
        }

        body {
     /*       background: url('https://i.ibb.co/hFDqgm0k/image.png') no-repeat center center fixed; */
            background-size: cover;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* الطبقة الزجاجية فوق الخلفية */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8); 
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            animation: slideDown 1s ease-out;
        }

        .main-banner {
            max-width: 900px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-top: -70px;
            background: var(--dark-bg);
            box-shadow: 0 0 30px var(--primary);
            position: relative;
            z-index: 10;
            transition: 0.5s;
        }

        .profile-pic:hover { transform: rotate(360deg) scale(1.1); }

        h1 { font-family: 'Orbitron'; font-size: 3.5rem; margin: 20px 0 5px; letter-spacing: 8px; color: white; text-shadow: 0 0 15px var(--primary); }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            transition: 0.4s;
            animation: fadeIn 1.5s ease-in;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }

        .card h3 { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 15px; }
        .card p { color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Orbitron';
            font-size: 0.8rem;
        }

        .btn-main { background: var(--secondary); color: white; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .btn-main:hover { transform: scale(1.1); background: #059669; }

        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <header>
        <p>.</p>
        <p></p>
        <br>
        <img src="https://i.ibb.co/Kzhc3nCr/image.png" class="profile-pic" alt="Avatar">
        <h1>ZYRAX-DEV</h1>
        <p style="color: var(--primary); font-family: 'Orbitron'; letter-spacing: 3px;">High-End MCPE Developer</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://i.ibb.co/pjLW4Yjy/image.png" style="width: 100%; border-radius: 15px; margin-bottom: 15px;">
            <h3>WelcomeRewards</h3>
            <p>The ultimate first-join experience with custom titles and sounds.</p>
            <a href="https://direct-link.net/4073500/ISEX5DkYnq7u" class="btn btn-main">DOWNLOAD NOW</a>
        </div>

        <div class="card" style="border-style: dashed; opacity: 0.7;">
            <div style="font-size: 3rem; margin-bottom: 15px;">🔒</div>
            <h3>Project #2</h3>
            <p>New innovative plugin is under development. Coming very soon!</p>
            <span style="color: #64748b; font-family: 'Orbitron'; font-size: 0.7rem;">STATUS: 45% DONE</span>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; color: #475569; font-size: 0.8rem; font-family: 'Orbitron';">
        &copy; 2026 ZYRAX-DEV | ALL RIGHTS RESERVED
    </footer>

</body>
        </html>
