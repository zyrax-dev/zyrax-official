<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyraX-Dev | Official Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --subtext: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #334155;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--bg);
        }

        h1 {
            color: var(--primary);
            margin: 0 0 0.5rem 0;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--subtext);
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: var(--bg);
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s ease;
            font-size: 1rem;
        }

        .btn:hover {
            background: #7dd3fc;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .discord-box {
            margin-top: 2rem;
            padding: 15px;
            background: #111827;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid #334155;
            color: var(--subtext);
        }

        .discord-box span {
            color: #818cf8;
            font-weight: bold;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--subtext);
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">Z</div>
        <h1>ZyraX-Dev</h1>
        <p class="tagline">Minecraft Plugin Developer & Software Enthusiast. Currently building new projects.</p>
        
        <div class="links-container">
            <a href="https://github.com/ZyraX-Dev" target="_blank" class="btn">GitHub Portfolio</a>
            
            </div>

        <div class="discord-box">
            Add me on Discord: <span>Aleox745</span>
        </div>

        <div class="footer">
            &copy; 2026 ZyraX-Dev. All Rights Reserved.
        </div>
    </div>

</body>
</html>
